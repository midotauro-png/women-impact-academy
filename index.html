const LV_CLR = { Founder:'#f87171', Expert:'#fcd34d', Advanced:'#c084fc', 'Rising Star':'#fbbf24', Contributor:'#60a5fa', Member:'#9ca3af', Mentor:'#34d399' };

function Av({ s, size=40, gold=false, founder=false }) {
  const bg = founder
    ? 'linear-gradient(135deg,#c81e1e,#ef4444)'
    : gold
      ? 'linear-gradient(135deg,#d4a017,#f5d98a)'
      : 'linear-gradient(135deg,#374151,#6b7280)';
  return (
    <div style={{ width:size, height:size, borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center', fontWeight:700, fontSize:size*0.33+'px', flexShrink:0, background:bg, color:founder||gold?'#fff':'#e5e7eb' }}>
      {s}
    </div>
  );
}

function Lv({ level }) {
  return <span style={{ background:LV_BG[level]||'#1f2937', color:LV_CLR[level]||'#9ca3af', fontSize:'11px', padding:'2px 8px', borderRadius:'999px', fontWeight:600 }}>{level}</span>;
}

function Diff({ d }) {
  const m = { Beginner:['#064e3b','#34d399'], Intermediate:['#1e3a5f','#60a5fa'], Advanced:['#2e1065','#c084fc'], Expert:['#422006','#fbbf24'] };
  const [bg,cl] = m[d]||['#1f2937','#9ca3af'];
  return <span style={{ background:bg, color:cl, fontSize:'11px', padding:'2px 8px', borderRadius:'4px', fontWeight:600 }}>{d}</span>;
}

function PBar({ v, h=6 }) {
  return (
    <div style={{ height:h, background:'rgba(0,0,0,0.04)', borderRadius:h/2, overflow:'hidden' }}>
      <div className="pbar" style={{ width:v+'%' }}/>
    </div>
  );
}

function Countdown({ target }) {
  const [t,setT] = useState({});
  useEffect(()=>{ const c=()=>{ const d=Math.max(0,target-Date.now()); setT({d:Math.floor(d/86400000),h:Math.floor((d%86400000)/3600000),m:Math.floor((d%3600000)/60000),s:Math.floor((d%60000)/1000)}); }; c(); const i=setInterval(c,1000); return()=>clearInterval(i); },[target]);
  const p=n=>String(n||0).padStart(2,'0');
  return (
    <div style={{ display:'flex', gap:'5px' }}>
      {[['d',t.d],['h',t.h],['m',t.m],['s',t.s]].map(([l,v])=>(
        <div key={l} style={{ textAlign:'center' }}>
          <div style={{ background:'#f0ece4', border:'1px solid rgba(200,30,30,.3)', borderRadius:'6px', padding:'4px 5px', fontFamily:'monospace', color:'#f87171', fontSize:'13px', fontWeight:700, minWidth:'32px' }}>{p(v)}</div>
          <div style={{ color:'#6b7280', fontSize:'10px', marginTop:'2px' }}>{l}</div>
        </div>
      ))}
    </div>
  );
}

            <button onClick={onUpgrade} className="red-grad" style={{ width:'100%', border:'none', color:'#fff', fontSize:'13px', fontWeight:700, padding:'10px', borderRadius:'10px', cursor:'pointer', marginBottom:'8px' }}>Upgrade to Pro — $29/mo</button>
            <div style={{ textAlign:'center', color:'#6b7280', fontSize:'11px' }}>📲 +973 36667243 · womenimpactclub.com</div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── MAIN APP ─────────────────────────────────────── */
function App() {
  const [tab,setTab] = useState('home');
  const [dark,setDark] = useState(false);
  const [showUpgrade,setShowUpgrade] = useState(false);
  const [showNotifs,setShowNotifs] = useState(false);
  const [notifs,setNotifs] = useState(NOTIFS);
  const [sq,setSq] = useState('');
  const [sqOpen,setSqOpen] = useState(false);
  const notifRef = useRef();
  const sqRef = useRef();

  const unread = notifs.filter(n=>!n.read).length;
  const markRead = () => setNotifs(p=>p.map(n=>({...n,read:true})));

  useEffect(()=>{
    const h=e=>{
      if(notifRef.current&&!notifRef.current.contains(e.target)) setShowNotifs(false);
      if(sqRef.current&&!sqRef.current.contains(e.target)) setSqOpen(false);
    };
    document.addEventListener('mousedown',h);
    return()=>document.removeEventListener('mousedown',h);
  },[]);

  const tabs=[
    {id:'home',      label:'Home',      Icon:I.Home},
    {id:'classroom', label:'Classroom', Icon:I.Book},
    {id:'community', label:'Community', Icon:I.Users},
    {id:'members',   label:'Members',   Icon:I.UserChk},
    {id:'dashboard', label:'Dashboard', Icon:I.Grid},
  ];

  const sqResults = sq.length>1?[
    ...COURSES.filter(c=>c.title.toLowerCase().includes(sq.toLowerCase())).slice(0,3).map(c=>({type:'course',title:c.title,sub:c.inst})),
    ...COMM_POSTS.filter(p=>p.title.toLowerCase().includes(sq.toLowerCase())).slice(0,2).map(p=>({type:'post',title:p.title,sub:p.author.name})),
  ]:[];

  const notifIcon = {comment:I.Msg,badge:I.Award,lesson:I.Book,event:I.Cal};
  const bg = dark?'#0a0a0f':'#faf8f5';
  const navBg = dark?'rgba(10,5,5,0.95)':'rgba(255,255,255,0.97)';
  const sub = dark?'#9ca3af':'#6b7280';

  return (
    <div className="grain" style={{ minHeight:'100vh', background:bg, color:dark?'#fff':'#111827', fontFamily:'Inter,sans-serif' }}>
      {/* NAV */}
      <nav style={{ position:'fixed', top:0, left:0, right:0, zIndex:100, backdropFilter:'blur(20px)', background:navBg, borderBottom:`1px solid ${dark?'rgba(200,30,30,0.15)':'rgba(0,0,0,0.08)'}`, height:'56px', display:'flex', alignItems:'center', padding:'0 20px', gap:'12px' }}>
        {/* Logo */}
        <div style={{ display:'flex', alignItems:'center', flexShrink:0 }}>
          <img src="ee.png" alt="Women Impact Academy" style={{ height:'44px', width:'auto', objectFit:'contain' }}/>
        </div>

        {/* Tabs */}
        <div style={{ display:'flex', flex:1, justifyContent:'center', gap:'2px' }}>
          {tabs.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{ display:'flex', alignItems:'center', gap:'6px', padding:'6px 12px', borderRadius:'10px', border:'none', fontSize:'13px', fontWeight:600, cursor:'pointer', background:tab===t.id?'rgba(200,30,30,.12)':'transparent', color:tab===t.id?'#f87171':sub, transition:'all .2s', whiteSpace:'nowrap' }}>
              <t.Icon size={13}/>{t.label}
            </button>
          ))}
        </div>

        {/* Right controls */}
        <div style={{ display:'flex', alignItems:'center', gap:'6px', flexShrink:0 }}>
          {/* Search */}
          <div ref={sqRef} style={{ position:'relative' }}>
            <button onClick={()=>setSqOpen(v=>!v)} style={{ background:sqOpen?'rgba(200,30,30,.12)':'none', border:'none', color:sub, cursor:'pointer', display:'flex', padding:'7px', borderRadius:'8px', transition:'all .2s' }}>
              <I.Search size={15}/>
            </button>
            {sqOpen&&(
              <div className="mfade" style={{ position:'absolute', right:0, top:'40px', width:'280px', background:'#ffffff', border:'1px solid rgba(200,30,30,.2)', borderRadius:'14px', padding:'10px', boxShadow:'0 20px 60px rgba(0,0,0,.6)', zIndex:200 }}>
                <input autoFocus value={sq} onChange={e=>setSq(e.target.value)} placeholder="Search courses, posts..." style={{ width:'100%', background:'#f0ece4', border:'1px solid rgba(0,0,0,0.09)', borderRadius:'8px', padding:'8px 12px', fontSize:'13px', color:'#1a1a2e', outline:'none', marginBottom:'8px' }}/>
                {sqResults.map((r,i)=>(
                  <div key={i} style={{ display:'flex', alignItems:'center', gap:'8px', padding:'8px', borderRadius:'8px', cursor:'pointer' }} onMouseOver={e=>e.currentTarget.style.background='rgba(255,255,255,0.05)'} onMouseOut={e=>e.currentTarget.style.background='transparent'}>
                    <span style={{ background:r.type==='course'?'rgba(37,99,235,.2)':'rgba(168,85,247,.2)', color:r.type==='course'?'#60a5fa':'#c084fc', fontSize:'10px', padding:'2px 6px', borderRadius:'4px', fontWeight:600, flexShrink:0 }}>{r.type}</span>
                    <div><div style={{ color:'#1a1a2e', fontSize:'12px', fontWeight:500 }}>{r.title}</div><div style={{ color:'#6b7280', fontSize:'11px' }}>{r.sub}</div></div>
                  </div>
                ))}
                {sq.length>1&&sqResults.length===0&&<div style={{ color:'#6b7280', fontSize:'12px', textAlign:'center', padding:'8px' }}>No results</div>}
              </div>
            )}
          </div>

          {/* Theme */}
          <button onClick={()=>setDark(v=>!v)} style={{ background:'none', border:'none', color:sub, cursor:'pointer', display:'flex', padding:'7px', borderRadius:'8px', transition:'background .2s' }} onMouseOver={e=>e.currentTarget.style.background='rgba(255,255,255,0.07)'} onMouseOut={e=>e.currentTarget.style.background='none'}>
            {dark?<I.Sun size={15}/>:<I.Moon size={15}/>}
          </button>

          {/* Notifs */}
          <div ref={notifRef} style={{ position:'relative' }}>
            <button onClick={()=>setShowNotifs(v=>!v)} style={{ background:'none', border:'none', color:sub, cursor:'pointer', display:'flex', padding:'7px', borderRadius:'8px', position:'relative', transition:'background .2s' }} onMouseOver={e=>e.currentTarget.style.background='rgba(255,255,255,0.07)'} onMouseOut={e=>e.currentTarget.style.background='none'}>
              <I.Bell size={15}/>
              {unread>0&&<span style={{ position:'absolute', top:'5px', right:'5px', width:'8px', height:'8px', background:'#c81e1e', borderRadius:'50%', border:`2px solid ${dark?'#0a0a0f':'#fff'}` }}/>}
            </button>
            {showNotifs&&(
              <div className="mfade" style={{ position:'absolute', right:0, top:'40px', width:'300px', background:'#ffffff', border:'1px solid rgba(200,30,30,.2)', borderRadius:'14px', overflow:'hidden', boxShadow:'0 20px 60px rgba(0,0,0,.6)', zIndex:200 }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'12px 16px', borderBottom:'1px solid rgba(0,0,0,0.07)', background:'rgba(200,30,30,.06)' }}>
                  <span style={{ color:'#1a1a2e', fontWeight:600, fontSize:'14px' }}>Notifications {unread>0&&<span style={{background:'#c81e1e',color:'#fff',fontSize:'10px',padding:'1px 6px',borderRadius:'999px',marginLeft:'4px'}}>{unread}</span>}</span>
                  <button onClick={markRead} style={{ background:'none', border:'none', color:'#f87171', fontSize:'12px', cursor:'pointer' }}>Mark all read</button>
                </div>
                {notifs.map(n=>{
                  const NIcon = notifIcon[n.type]||I.Bell;
                  return (
                    <div key={n.id} style={{ display:'flex', gap:'10px', padding:'12px 16px', borderBottom:'1px solid rgba(0,0,0,0.06)', background:!n.read?'rgba(200,30,30,0.04)':'transparent' }}>
                      <div style={{ padding:'8px', borderRadius:'8px', background:!n.read?'rgba(200,30,30,0.15)':'rgba(255,255,255,0.05)', flexShrink:0, display:'flex' }}>
                        <NIcon size={13}/>
                      </div>
                      <div style={{ flex:1 }}>
                        <div style={{ color:!n.read?'#fff':'#9ca3af', fontSize:'12px', lineHeight:'1.5' }}>{n.text}</div>
                        <div style={{ color:'#4b5563', fontSize:'11px', marginTop:'2px' }}>{n.time}</div>
                      </div>
                      {!n.read&&<div style={{ width:'6px', height:'6px', background:'#f87171', borderRadius:'50%', marginTop:'6px', flexShrink:0 }}/>}
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          {/* Upgrade */}
          <button onClick={()=>setShowUpgrade(true)} className="red-grad" style={{ border:'none', color:'#fff', fontSize:'12px', fontWeight:700, padding:'7px 14px', borderRadius:'8px', cursor:'pointer', display:'flex', alignItems:'center', gap:'5px' }}>
            <I.Zap size={11}/>Upgrade
          </button>

          <Av s="SA" size={30}/>
        </div>
      </nav>

      {/* CONTENT */}
      <main style={{ paddingTop:'72px', paddingBottom:'48px', paddingLeft:'20px', paddingRight:'20px', maxWidth:'1260px', margin:'0 auto' }}>
        {tab==='home'      && <TabHome      onUpgrade={()=>setShowUpgrade(true)}/>}
        {tab==='classroom' && <TabClassroom onUpgrade={()=>setShowUpgrade(true)}/>}
        {tab==='community' && <TabCommunity/>}
        {tab==='members'   && <TabMembers/>}
        {tab==='dashboard' && <TabDashboard onUpgrade={()=>setShowUpgrade(true)}/>}
      </main>

      {/* Footer */}
      <footer style={{ borderTop:'1px solid rgba(200,30,30,.2)', padding:'16px 20px', textAlign:'center', color:'#4b5563', fontSize:'12px' }}>
        <span style={{ color:'#f87171', fontWeight:600 }}>Women Impact Academy</span> · Empowering Women. Developing Skills. Transforming Futures.
        &nbsp;·&nbsp; 📲 +973 36667243 &nbsp;·&nbsp; 🌐 womenimpactclub.com &nbsp;·&nbsp; Bahrain 🇧🇭
      </footer>

      {showUpgrade && <UpgradeModal onClose={()=>setShowUpgrade(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
